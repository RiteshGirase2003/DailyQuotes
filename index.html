<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #1e293b, #0f172a);
    font-family: Arial, sans-serif;
    overflow: hidden;
    touch-action: none;
  }

  /* ✅ FIX 1: full width safety container */
  .scene {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    perspective: 1200px;
    overflow: hidden;
  }

  /* ✅ FIX 2: absolute safe fixed card size */
  .card {
    width: 320px;
    max-width: 92vw;
    height: 440px;
    position: relative;

    transform-style: preserve-3d;
    transition: transform 0.6s ease, opacity 0.25s ease;

    transform-origin: center;
  }

  .face {
    position: absolute;
    inset: 0;

    border-radius: 22px;
    backface-visibility: hidden;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    padding: 24px;
    text-align: center;

    box-shadow: 0 20px 50px rgba(0,0,0,0.5);

    box-sizing: border-box; /* ✅ FIX 3 */
  }

  .front {
    background: #1e293b;
    color: white;
  }

  .back {
    background: #0f172a;
    color: #fbbf24;
    transform: rotateY(180deg);
  }

  .text {
    font-size: 18px;
    line-height: 1.5;
    max-width: 100%;
  }

  .author {
    margin-top: 14px;
    font-size: 13px;
    opacity: 0.7;
    color: #94a3b8;
  }

  .hint {
    position: absolute;
    bottom: 14px;
    font-size: 10px;
    opacity: 0.4;
  }
</style>
</head>

let index = 0;
let flipped = false;

const card = document.getElementById("card");
const quoteText = document.getElementById("quoteText");
const quoteAuthor = document.getElementById("quoteAuthor");
const meaningText = document.getElementById("meaningText");
const meaningAuthor = document.getElementById("meaningAuthor");

function render() {
  const item = data[index];
  quoteText.textContent = item.quote;
  meaningText.textContent = item.meaning;
  quoteAuthor.textContent = "— " + item.said_by;
  meaningAuthor.textContent = "Meaning";
}

render();

/* flip */
function flipLeft() {
  flipped = !flipped;
  card.style.transform = flipped ? "rotateY(-180deg)" : "rotateY(0deg)";
}

function flipRight() {
  flipped = !flipped;
  card.style.transform = flipped ? "rotateY(180deg)" : "rotateY(0deg)";
}

/* next */
function nextCard() {
  card.style.transition = "transform 0.25s ease, opacity 0.25s ease";

  card.style.transform = "scale(0.85)";
  card.style.opacity = "0";

  setTimeout(() => {
    index = Math.floor(Math.random() * data.length);
    flipped = false;

    render();

    card.style.transform = "rotateY(0deg) scale(1)";
    card.style.opacity = "1";
  }, 200);
}

/* swipe */
let startX = 0;
let startY = 0;

card.addEventListener("touchstart", (e) => {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
});

card.addEventListener("touchend", (e) => {
  let dx = e.changedTouches[0].clientX - startX;
  let dy = e.changedTouches[0].clientY - startY;
  handleSwipe(dx, dy);
});

card.addEventListener("mousedown", (e) => {
  startX = e.clientX;
  startY = e.clientY;
});

document.addEventListener("mouseup", (e) => {
  let dx = e.clientX - startX;
  let dy = e.clientY - startY;
  handleSwipe(dx, dy);
});

function handleSwipe(dx, dy) {
  const threshold = 60;

  if (Math.abs(dx) > Math.abs(dy)) {
    if (Math.abs(dx) > threshold) {
      dx < 0 ? flipLeft() : flipRight();
    }
  } else {
    if (Math.abs(dy) > threshold) {
      nextCard();
    }
  }
}
